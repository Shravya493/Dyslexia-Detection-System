<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DyslexiAI</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600|Roboto:400,500|Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <!-- Welcome Message Inside Container -->
        <div class="welcome-container">
            <h1 class="dyslexia-text">
                <span class="flip">W</span>
                <span>E</span>
                <span class="flip">L</span>
                <span>C</span>
                <span class="flip">O</span>
                <span>M</span>
                <span class="flip">E</span>
            </h1>
            <h3 class="subtext">TO dyslexiAI</h3>
        </div>
        
        <!-- Login Form -->
        <h2>Login to DyslexiAI</h2>
        <form id="login-form">
            <label for="email">Email:</label>
            <input type="email" id="login-email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="login-password" name="password" required>

            <button type="submit" class="btn">Login</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
    </div>
    <script type="text/javascript" src="auth.js"></script>
</body>
</html>
